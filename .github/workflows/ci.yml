# =============================================================================
# CI Pipeline — Build + Test
# =============================================================================
# Executa build da solution e testes unitários em cada push/PR para main/develop.
# Garante que o código compila e os testes passam antes do merge.
# =============================================================================

name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ vars.DOTNET_VERSION || '8.0' }})
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout do código
      # ------------------------------------------------------------------
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup .NET SDK
      # ------------------------------------------------------------------
      - name: 🔧 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ------------------------------------------------------------------
      # 3. Cache NuGet packages
      # ------------------------------------------------------------------
      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # ------------------------------------------------------------------
      # 4. Restore dependencies
      # ------------------------------------------------------------------
      - name: 📦 Restore dependencies
        run: dotnet restore shop-microservices.sln

      # ------------------------------------------------------------------
      # 5. Build da solution
      # ------------------------------------------------------------------
      - name: 🔨 Build
        run: dotnet build shop-microservices.sln --configuration Release --no-restore

      # ------------------------------------------------------------------
      # 6. Executar testes unitários
      # ------------------------------------------------------------------
      - name: 🧪 Run Tests
        run: dotnet test shop-microservices.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      # ------------------------------------------------------------------
      # 7. Upload test results (mesmo se falhar)
      # ------------------------------------------------------------------
      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/**/coverage.cobertura.xml
          retention-days: 30
