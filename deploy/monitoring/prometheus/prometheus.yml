# ============================================================================
# Prometheus Configuration
# Scrape metrics from all microservices via their /metrics endpoints
# ============================================================================

global:
  scrape_interval: 15s       # Coletar métricas a cada 15 segundos
  evaluation_interval: 15s    # Avaliar regras a cada 15 segundos

scrape_configs:
  # --------------------------------------------------------------------------
  # API Gateway
  # --------------------------------------------------------------------------
  - job_name: "api-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api-gateway:8080"]
        labels:
          service: "api-gateway"
          layer: "gateway"

  # --------------------------------------------------------------------------
  # Catalog API
  # --------------------------------------------------------------------------
  - job_name: "catalog-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["catalog-api:8080"]
        labels:
          service: "catalog-api"
          layer: "microservice"
          database: "sqlserver"

  # --------------------------------------------------------------------------
  # Basket API
  # --------------------------------------------------------------------------
  - job_name: "basket-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["basket-api:8080"]
        labels:
          service: "basket-api"
          layer: "microservice"
          database: "redis"

  # --------------------------------------------------------------------------
  # Ordering API
  # --------------------------------------------------------------------------
  - job_name: "ordering-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ordering-api:8080"]
        labels:
          service: "ordering-api"
          layer: "microservice"
          database: "mongodb"
