# =============================================================================
# CD Pipeline — Docker Build + Push
# =============================================================================
# Constrói e publica imagens Docker de cada microserviço no GitHub Container
# Registry (ghcr.io) quando um push é feito na branch main ou uma tag é criada.
# =============================================================================

name: CD — Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/shop

jobs:
  # ============================================================================
  # Build e Push de cada microserviço em paralelo
  # ============================================================================
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: catalog-api
            dockerfile: src/Catalog.API/Dockerfile
            context: .
          - service: basket-api
            dockerfile: src/Basket.API/Dockerfile
            context: .
          - service: ordering-api
            dockerfile: src/Ordering.API/Dockerfile
            context: .
          - service: api-gateway
            dockerfile: src/ApiGateway/Dockerfile
            context: .

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout do código
      # ------------------------------------------------------------------
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Docker Buildx
      # ------------------------------------------------------------------
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 3. Login no GitHub Container Registry
      # ------------------------------------------------------------------
      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 4. Extrair metadata (tags e labels)
      # ------------------------------------------------------------------
      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            # Tag "latest" para a branch main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag semver para tags (ex: v1.0.0 → 1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag SHA para rastreabilidade
            type=sha,prefix=sha-

      # ------------------------------------------------------------------
      # 5. Build e Push da imagem Docker
      # ------------------------------------------------------------------
      - name: 🚀 Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================================
  # Notificação de conclusão
  # ============================================================================
  notify:
    name: 📢 Deploy Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: 📋 Summary
        run: |
          echo "## 🐳 Docker Build & Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Catalog API | \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-catalog-api\` | ${{ needs.build-and-push.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Basket API | \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-basket-api\` | ${{ needs.build-and-push.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ordering API | \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ordering-api\` | ${{ needs.build-and-push.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api-gateway\` | ${{ needs.build-and-push.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
